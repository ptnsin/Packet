<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PacketWatch — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;
  --border:rgba(48,54,61,0.8);--accent:#00d2a8;
  --danger:#f85149;--warning:#e3b341;
  --text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
/* NAV */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:700;}
.nav-logo span{color:var(--accent);}
.live-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;}
.live-label{font-size:11px;color:var(--accent);font-family:var(--mono);letter-spacing:.5px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-role{background:rgba(0,210,168,.1);color:var(--accent);border:1px solid rgba(0,210,168,.25);border-radius:20px;padding:3px 12px;font-size:11px;font-family:var(--mono);font-weight:500;}
.nav-link{color:var(--text-muted);font-size:13px;text-decoration:none;padding:5px 10px;border-radius:6px;transition:color .2s,background .2s;}
.nav-link:hover{color:var(--text);background:var(--surface2);}
.nav-link.admin-only{display:none;}
.btn-nav{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:12px;padding:5px 12px;cursor:pointer;font-family:var(--sans);transition:border-color .2s,color .2s;}
.btn-nav:hover{border-color:var(--danger);color:var(--danger);}
/* ALERT */
.alert-banner{display:none;margin:1rem 1.5rem 0;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.4);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);align-items:center;gap:8px;animation:slideIn .3s ease;}
.alert-banner.show{display:flex;}
@keyframes slideIn{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
.alert-close{margin-left:auto;cursor:pointer;opacity:.6;font-size:18px;}
.alert-close:hover{opacity:1;}
/* MAIN */
.main{padding:1.25rem 1.5rem;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.stat-label{font-size:11px;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;font-weight:500;margin-bottom:6px;}
.stat-value{font-family:var(--mono);font-size:26px;font-weight:700;}
.stat-value.c-total{color:var(--text);}
.stat-value.c-enc{color:var(--accent);}
.stat-value.c-plain{color:var(--warning);}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:var(--mono);}
.section-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:1.25rem;}
canvas{width:100%!important;height:180px!important;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.table-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;}
.badge-count{background:var(--surface2);color:var(--text-muted);border-radius:20px;padding:2px 8px;font-size:11px;font-family:var(--mono);}
table{width:100%;border-collapse:collapse;}
th{padding:8px 16px;text-align:left;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;letter-spacing:.4px;text-transform:uppercase;}
td{padding:8px 16px;color:var(--text);border-bottom:1px solid rgba(48,54,61,.4);font-family:var(--mono);font-size:11px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.enc-yes{color:var(--accent);}
.enc-no{color:var(--warning);}
.proto{background:var(--surface2);border-radius:4px;padding:2px 6px;font-size:10px;}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-left">
    <div class="nav-logo"><span>PACKET</span>WATCH</div>
    <div class="live-dot"></div>
    <div class="live-label">LIVE</div>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="users.html" class="nav-link admin-only" id="users-link">User Management</a>
    <span class="nav-role" id="role-badge">USER</span>
    <button class="btn-nav" onclick="logout()">ออกจากระบบ</button>
  </div>
</nav>

<div class="alert-banner" id="alert-banner">
  <span>⚠</span>
  <span id="alert-text">Security Alert</span>
  <span class="alert-close" onclick="closeAlert()">✕</span>
</div>

<div class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Packets</div>
      <div class="stat-value c-total" id="stat-total">—</div>
      <div class="stat-sub" id="sub-total">loading...</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Encrypted</div>
      <div class="stat-value c-enc" id="stat-enc">—</div>
      <div class="stat-sub" id="sub-enc">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Plain</div>
      <div class="stat-value c-plain" id="stat-plain">—</div>
      <div class="stat-sub" id="sub-plain">—</div>
    </div>
  </div>

  <div class="section-title">Packet Activity (Real-time)</div>
  <div class="chart-wrap">
    <canvas id="mainChart"></canvas>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">Recent Packets</div>
      <span class="badge-count" id="tbl-count">0 rows</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Source IP</th>
          <th>Dest IP</th>
          <th>Protocol</th>
          <th>Length</th>
          <th>Enc</th>
        </tr>
      </thead>
      <tbody id="packet-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const API_BASE = '/api';
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');
if (!token) window.location.href = 'login.html';

if (role === 'admin') {
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
}
document.getElementById('role-badge').textContent = (role || 'user').toUpperCase();

function authHeaders() {
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('role');
  window.location.href = 'login.html';
}

let chart, chartLabels = [], chartEncData = [], chartPlainData = [];
let alertTimeout;

function initChart() {
  const now = Date.now();
  chartLabels = Array.from({ length: 12 }, (_, i) => {
    const d = new Date(now - (11 - i) * 5000);
    return d.getMinutes() + ':' + String(d.getSeconds()).padStart(2, '0');
  });
  chartEncData = Array.from({ length: 12 }, () => 0);
  chartPlainData = Array.from({ length: 12 }, () => 0);

  const ctx = document.getElementById('mainChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartLabels,
      datasets: [
        { label: 'Encrypted', data: chartEncData, borderColor: '#00d2a8', backgroundColor: 'rgba(0,210,168,.08)', borderWidth: 1.5, pointRadius: 2, tension: .4, fill: true },
        { label: 'Plain', data: chartPlainData, borderColor: '#e3b341', backgroundColor: 'rgba(227,179,65,.06)', borderWidth: 1.5, pointRadius: 2, tension: .4, fill: true }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#7d8590', font: { family: 'JetBrains Mono', size: 11 }, boxWidth: 12, padding: 16 } }
      },
      scales: {
        x: { ticks: { color: '#484f58', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(48,54,61,.5)' } },
        y: { ticks: { color: '#484f58', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(48,54,61,.5)' }, beginAtZero: true }
      }
    }
  });
}

function pushChartPoint(encCount, plainCount) {
  const d = new Date();
  const label = d.getMinutes() + ':' + String(d.getSeconds()).padStart(2, '0');
  chartLabels.push(label); chartLabels.shift();
  chartEncData.push(encCount); chartEncData.shift();
  chartPlainData.push(plainCount); chartPlainData.shift();
  chart.update('none');
}

async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/packets/stats`, { headers: authHeaders() });
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total.toLocaleString();
    document.getElementById('stat-enc').textContent = data.encrypted.toLocaleString();
    document.getElementById('stat-plain').textContent = data.plain.toLocaleString();
    const pct = data.total ? Math.round((data.encrypted / data.total) * 100) : 0;
    document.getElementById('sub-total').textContent = 'all captured';
    document.getElementById('sub-enc').textContent = pct + '% of total';
    document.getElementById('sub-plain').textContent = (100 - pct) + '% of total';
  } catch (err) {
    console.error('Stats error:', err);
  }
}

async function loadPackets() {
  try {
    const res = await fetch(`${API_BASE}/packets/history?limit=20`, { headers: authHeaders() });
    const data = await res.json();
    renderPackets(data.data || []);
  } catch (err) {
    console.error('Packets error:', err);
  }
}

function renderPackets(pkts) {
  const tbody = document.getElementById('packet-tbody');
  document.getElementById('tbl-count').textContent = pkts.length + ' rows';
  tbody.innerHTML = pkts.map(p => {
    const ts = new Date(p.timestamp).toISOString().slice(0, 19).replace('T', ' ');
    return `<tr>
      <td>${ts}</td>
      <td>${p.sourceIp}</td>
      <td>${p.destIp}</td>
      <td><span class="proto">${p.protocol}</span></td>
      <td>${p.length}</td>
      <td class="${p.isEncrypted ? 'enc-yes' : 'enc-no'}">${p.isEncrypted ? 'YES' : 'NO'}</td>
    </tr>`;
  }).join('');
}

function showAlert(msg) {
  document.getElementById('alert-text').textContent = msg;
  document.getElementById('alert-banner').classList.add('show');
  clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => document.getElementById('alert-banner').classList.remove('show'), 6000);
}

function closeAlert() {
  document.getElementById('alert-banner').classList.remove('show');
  clearTimeout(alertTimeout);
}

// Socket.io
function initSocket() {
  const socket = io({ auth: { token } });
  socket.on('packet-received', (packet) => {
    loadStats();
    loadPackets();
    pushChartPoint(packet.isEncrypted ? 1 : 0, packet.isEncrypted ? 0 : 1);
  });
  socket.on('security-alert', (data) => {
    showAlert(data.message || 'Security Alert: พบ packet ที่น่าสงสัย');
  });
  socket.on('connect_error', (err) => {
    console.warn('Socket error:', err.message);
  });
}

initChart();
loadStats();
loadPackets();
try { initSocket(); } catch(e) { console.warn('Socket.io not available'); }
setInterval(() => { loadStats(); loadPackets(); }, 15000);
</script>
</body>
</html>
