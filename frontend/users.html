<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PacketWatch — User Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;
  --border:rgba(48,54,61,0.8);--accent:#00d2a8;
  --danger:#f85149;--warning:#e3b341;--info:#1f8ef1;
  --text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
/* NAV */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:700;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-link{color:var(--text-muted);font-size:13px;text-decoration:none;padding:5px 10px;border-radius:6px;transition:color .2s,background .2s;}
.nav-link:hover{color:var(--text);background:var(--surface2);}
.nav-link.active{color:var(--text);}
.nav-role{background:rgba(0,210,168,.1);color:var(--accent);border:1px solid rgba(0,210,168,.25);border-radius:20px;padding:3px 12px;font-size:11px;font-family:var(--mono);}
.btn-nav{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:12px;padding:5px 12px;cursor:pointer;font-family:var(--sans);transition:border-color .2s,color .2s;}
.btn-nav:hover{border-color:var(--danger);color:var(--danger);}
/* MAIN */
.main{padding:1.5rem;max-width:1100px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.page-title{font-size:20px;font-weight:600;}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}
/* LAYOUT 2-col */
.layout{display:grid;grid-template-columns:1fr 360px;gap:1.25rem;align-items:start;}
@media(max-width:860px){.layout{grid-template-columns:1fr;}}
/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.table-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;}
.badge-count{background:var(--surface2);color:var(--text-muted);border-radius:20px;padding:2px 8px;font-size:11px;font-family:var(--mono);}
table{width:100%;border-collapse:collapse;}
th{padding:8px 16px;text-align:left;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;letter-spacing:.4px;text-transform:uppercase;}
td{padding:9px 16px;color:var(--text);border-bottom:1px solid rgba(48,54,61,.4);font-size:13px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono);}
.role-badge.admin{background:rgba(0,210,168,.1);color:var(--accent);border:1px solid rgba(0,210,168,.25);}
.role-badge.user{background:rgba(31,142,241,.1);color:var(--info);border:1px solid rgba(31,142,241,.25);}
.btn-delete{background:transparent;border:1px solid rgba(248,81,73,.25);color:var(--danger);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:background .15s;}
.btn-delete:hover{background:rgba(248,81,73,.1);}
.btn-delete:disabled{opacity:.3;cursor:not-allowed;}
/* FORM CARD */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}
.form-title{font-size:13px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:1.25rem;padding-bottom:10px;border-bottom:1px solid var(--border);}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text-dim);}
.field select option{background:var(--surface2);}
.btn-create{width:100%;background:var(--accent);color:#0d1117;border:none;border-radius:7px;padding:10px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn-create:hover{opacity:.88;}
.btn-create:active{transform:scale(.98);}
.btn-create:disabled{opacity:.4;cursor:not-allowed;}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:100;}
.toast.success{background:rgba(0,210,168,.15);border:1px solid rgba(0,210,168,.4);color:var(--accent);}
.toast.error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.4);color:var(--danger);}
.toast.show{opacity:1;transform:translateY(0);}
/* ACCESS DENIED */
.access-denied{text-align:center;padding:4rem 2rem;color:var(--text-muted);}
.access-denied h2{font-size:18px;color:var(--danger);margin-bottom:.5rem;}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-left">
    <div class="nav-logo"><span>PACKET</span>WATCH</div>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="users.html" class="nav-link active">User Management</a>
    <span class="nav-role">ADMIN</span>
    <button class="btn-nav" onclick="logout()">ออกจากระบบ</button>
  </div>
</nav>

<div class="main" id="main-content">
  <div class="page-header">
    <div>
      <div class="page-title">User Management</div>
      <div class="page-sub">จัดการผู้ใช้งานในระบบ (Admin เท่านั้น)</div>
    </div>
  </div>

  <div class="layout">
    <!-- User Table -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">รายชื่อผู้ใช้ทั้งหมด</div>
        <span class="badge-count" id="user-count">0 users</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="user-tbody">
          <tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:2rem;">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Create User Form -->
    <div class="form-card">
      <div class="form-title">สร้าง User ใหม่</div>
      <form id="create-form">
        <div class="field">
          <label>Username</label>
          <input type="text" id="new-username" placeholder="กรอก username" autocomplete="off" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="new-password" placeholder="กรอก password" required/>
        </div>
        <div class="field">
          <label>Role</label>
          <select id="new-role">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <button class="btn-create" type="submit" id="btn-create">สร้างผู้ใช้</button>
      </form>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '/api';
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');

if (!token) window.location.href = 'login.html';
if (role !== 'admin') {
  document.getElementById('main-content').innerHTML = `
    <div class="access-denied">
      <h2>Access Denied</h2>
      <p>หน้านี้สำหรับ Admin เท่านั้น</p>
    </div>`;
}

function authHeaders() {
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('role');
  window.location.href = 'login.html';
}

let currentUserId = null;
try {
  const payload = JSON.parse(atob(token.split('.')[1]));
  currentUserId = payload.id;
} catch(e) {}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function loadUsers() {
  try {
    const res = await fetch(`${API_BASE}/users`, { headers: authHeaders() });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const users = await res.json();
    renderUsers(users);
  } catch (err) {
    showToast('โหลดข้อมูลผู้ใช้ไม่สำเร็จ', 'error');
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('user-tbody');
  document.getElementById('user-count').textContent = users.length + ' users';
  if (users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:2rem;">ยังไม่มีผู้ใช้งาน</td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => {
    const created = new Date(u.createdAt).toLocaleDateString('th-TH', { year: '2-digit', month: 'short', day: 'numeric' });
    const isSelf = u.id === currentUserId;
    return `<tr>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text-dim)">${u.id}</td>
      <td style="font-weight:500;">${u.username}${isSelf ? ' <span style="font-size:10px;color:var(--text-dim)">(คุณ)</span>' : ''}</td>
      <td><span class="role-badge ${u.role}">${u.role}</span></td>
      <td style="font-size:12px;color:var(--text-muted)">${created}</td>
      <td>
        <button class="btn-delete" onclick="deleteUser(${u.id}, '${u.username}')" ${isSelf ? 'disabled title="ไม่สามารถลบตัวเองได้"' : ''}>ลบ</button>
      </td>
    </tr>`;
  }).join('');
}

async function deleteUser(id, username) {
  if (!confirm(`ยืนยันลบผู้ใช้ "${username}"?`)) return;
  try {
    const res = await fetch(`${API_BASE}/users/${id}`, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) { showToast(data.message || 'ลบไม่สำเร็จ', 'error'); return; }
    showToast(data.message || 'ลบผู้ใช้สำเร็จ', 'success');
    loadUsers();
  } catch (err) {
    showToast('เกิดข้อผิดพลาด', 'error');
  }
}

document.getElementById('create-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const userRole = document.getElementById('new-role').value;
  const btn = document.getElementById('btn-create');

  if (!username || !password) { showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'กำลังสร้าง...';

  try {
    const res = await fetch(`${API_BASE}/auth/register`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ username, password, role: userRole })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.message || 'สร้างไม่สำเร็จ', 'error'); return; }
    showToast(`สร้างผู้ใช้ "${username}" สำเร็จ`, 'success');
    document.getElementById('create-form').reset();
    loadUsers();
  } catch (err) {
    showToast('เกิดข้อผิดพลาด', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'สร้างผู้ใช้';
  }
});

if (role === 'admin') loadUsers();
</script>
</body>
</html>
